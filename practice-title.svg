<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 190" role="img" aria-labelledby="title desc">
  <title id="title">EnglishRoad Practice Quizzes</title>
  <desc id="desc">A blue EnglishRoad header for the Practice Quizzes tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fcff"/>
      <stop offset="0.58" stop-color="#d9edf9"/>
      <stop offset="1" stop-color="#eef8fd"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17456f"/>
      <stop offset="1" stop-color="#2f7fb8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#17456f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="190" rx="20" fill="url(#bg)"/>
  <path d="M760 0H1024V190H694L760 0Z" fill="#c2e2f4" opacity="0.58"/>
  <path d="M0 158H1024" stroke="#84bddc" stroke-width="2" opacity="0.45"/>
  <path d="M42 154H492" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <text x="42" y="68" fill="#17456f" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="6">ENGLISHROAD</text>
  <text x="42" y="133" fill="#102033" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900" letter-spacing="0">Practice Quizzes</text>

  <g filter="url(#cardShadow)">
    <rect x="700" y="36" width="244" height="124" rx="16" fill="#ffffff"/>
    <rect x="724" y="60" width="132" height="11" rx="5.5" fill="#2f7fb8" opacity="0.26"/>
    <rect x="724" y="86" width="176" height="9" rx="4.5" fill="#84bddc" opacity="0.42"/>
    <rect x="724" y="111" width="154" height="9" rx="4.5" fill="#84bddc" opacity="0.28"/>
    <circle cx="890" cy="65" r="18" fill="#2f7fb8"/>
    <path d="M881 65l7 7 14-17" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(728 132)">
