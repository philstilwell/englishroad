<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 190" role="img" aria-labelledby="title desc">
  <title id="title">EnglishRoad English Level Check</title>
  <desc id="desc">An olive EnglishRoad header for the English Level Check tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf2"/>
      <stop offset="0.58" stop-color="#e9ecd4"/>
      <stop offset="1" stop-color="#f3f1e1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35430f"/>
      <stop offset="1" stop-color="#b88926"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#35430f" flood-opacity="0.18"/>
