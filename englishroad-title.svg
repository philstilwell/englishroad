  </defs>

  <rect width="1024" height="190" rx="20" fill="url(#bg)"/>
  <path d="M760 0H1024V190H694L760 0Z" fill="#d9ddba" opacity="0.62"/>
  <path d="M0 158H1024" stroke="#d1cfab" stroke-width="2" opacity="0.65"/>
